<!DOCTYPE html>
<html>
<head>
  <title>Dragon Adventures Value Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 60%;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
    }

    .section {
      margin: 20px 0;
    }

    .dragon-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .dragon {
      background: #1e293b;
      padding: 10px;
      border-radius: 12px;
      width: 120px;
      cursor: pointer;
      transition: 0.2s;
      border: 2px solid transparent;
    }

    .dragon:hover {
      transform: scale(1.05);
      border: 2px solid #38bdf8;
    }

    .dragon img {
      width: 80px;
      height: 80px;
      border-radius: 10px;
    }

    .selected {
      border: 2px solid #22c55e !important;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      cursor: pointer;
      font-size: 16px;
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
    }
  </style>
</head>

<body>

<h1>Dragon Adventures Value Calculator</h1>

<input id="search" placeholder="Search dragons...">

<div class="section">
  <h2>You</h2>
  <div id="youBox" class="dragon-grid"></div>
</div>

<div class="section">
  <h2>Them</h2>
  <div id="themBox" class="dragon-grid"></div>
</div>

<button onclick="checkTrade()">Check Trade</button>

<div id="result"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const dragons = [
    { name: "Veidreki", value: "35M", img: "https://static.wikia.nocookie.net/dragon-adventures/images/a/aa/Veidreki_Icon.png" },
    { name: "Alatura", value: "17M", img: "https://static.wikia.nocookie.net/dragon-adventures/images/d/d0/Alatura_Icon.png" },
    { name: "Moixura", value: "10M", img: "https://static.wikia.nocookie.net/dragon-adventures/images/2/27/Moixaura_Icon.png" },
    { name: "Venid", value: "2K", img: "https://static.wikia.nocookie.net/dragon-adventures/images/8/81/Venid_Icon.png" }
  ];

  let p1 = 0;
  let p2 = 0;

  function parseValue(input) {
    if (!input) return 0;

    input = input.toString().toUpperCase().trim();

    if (input.endsWith("M")) {
      return parseFloat(input) * 1_000_000;
    }

    if (input.endsWith("K")) {
      return parseFloat(input) * 1_000;
    }

    return parseFloat(input) || 0;
  }

  function renderDragons() {
    const search = document.getElementById("search").value.toLowerCase();

    const youBox = document.getElementById("youBox");
    const themBox = document.getElementById("themBox");

    youBox.innerHTML = "";
    themBox.innerHTML = "";

    dragons
      .filter(d => d.name.toLowerCase().includes(search))
      .forEach(d => {

        const card1 = document.createElement("div");
        card1.className = "dragon";
        card1.innerHTML = `<img src="${d.img}"><p>${d.name}</p>`;
        card1.onclick = () => {
          selectDragon(1, d.value, card1);
        };

        const card2 = document.createElement("div");
        card2.className = "dragon";
        card2.innerHTML = `<img src="${d.img}"><p>${d.name}</p>`;
        card2.onclick = () => {
          selectDragon(2, d.value, card2);
        };

        youBox.appendChild(card1);
        themBox.appendChild(card2);
      });
  }

  function selectDragon(player, value, element) {
    const parent = element.parentNode;
    parent.querySelectorAll(".dragon").forEach(el => el.classList.remove("selected"));
    element.classList.add("selected");

    const num = parseValue(value);

    if (player === 1) p1 = num;
    else p2 = num;
  }

  function checkTrade() {

    if (!p1 || !p2) {
      document.getElementById("result").innerText = "Pick dragons first!";
      return;
    }

    let diff = p1 - p2;
    let percent = diff / Math.max(p1, p2);

    let result = "";

    if (Math.abs(percent) < 0.1) {
      result = "FAIR TRADE";
    } else if (percent > 0) {
      result = percent > 0.5 ? "HUGE WIN FOR YOU" : "WIN FOR YOU";
    } else {
      result = percent < -0.5 ? "HUGE LOSS FOR YOU" : "LOSS FOR YOU";
    }

    document.getElementById("result").innerText =
      `You: ${p1.toLocaleString()} | Them: ${p2.toLocaleString()} → ${result}`;
  }

  // IMPORTANT: hook search + run render AFTER page loads
  document.getElementById("search").addEventListener("input", renderDragons);

  renderDragons();

  window.checkTrade = checkTrade;
});
</script>

</body>
</html>
