<!DOCTYPE html>
<html>
<head>
  <title>Dragon Adventures Value Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      width: 60%;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
    }

    .section {
      margin: 20px 0;
    }

    .dragon-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .dragon {
      background: #1e293b;
      padding: 10px;
      border-radius: 12px;
      width: 120px;
      cursor: pointer;
      transition: 0.2s;
      border: 2px solid transparent;
    }

    .dragon:hover {
      transform: scale(1.05);
      border: 2px solid #38bdf8;
    }

    .dragon img {
      width: 80px;
      height: 80px;
      border-radius: 10px;
    }

    .selected {
      border: 2px solid #22c55e !important;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      cursor: pointer;
      font-size: 16px;
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
    }
  </style>
</head>

<body>

<h1>Dragon Adventures Value Calculator</h1>

<!-- SEARCH -->
<input id="search" placeholder="Search dragons..." oninput="renderDragons()">

<!-- PLAYER 1 -->
<div class="section">
  <h2>You</h2>
  <div id="youInput" class="dragon-grid"></div>
</div>

<!-- PLAYER 2 -->
<div class="section">
  <h2>Them</h2>
  <div id="themInput" class="dragon-grid"></div>
</div>

<button onclick="checkTrade()">Check Trade</button>

<div id="result"></div>

<script>
//  DATABASE
const dragons = [
  { name: "Veidreki", value: 35M, img: "https://static.wikia.nocookie.net/dragon-adventures/images/a/aa/Veidreki_Icon.png" },
  { name: "Alatura", value: 17M, img: "https://static.wikia.nocookie.net/dragon-adventures/images/d/d0/Alatura_Icon.png" },
  { name: "Moixura", value: 10M, img: "https://static.wikia.nocookie.net/dragon-adventures/images/2/27/Moixaura_Icon.png" },
  { name: "Venid", value: 2K, img: "https://static.wikia.nocookie.net/dragon-adventures/images/8/81/Venid_Icon.png" }
];

let p1 = 0;
let p2 = 0;

// RENDER FUNCTION (SEARCH FILTER INCLUDED)
function renderDragons() {
  const search = document.getElementById("search").value.toLowerCase();

  const p1List = document.getElementById("p1-list");
  const p2List = document.getElementById("p2-list");

  p1List.innerHTML = "";
  p2List.innerHTML = "";

  dragons
    .filter(d => d.name.toLowerCase().includes(search))
    .forEach(d => {

      // PLAYER 1 CARD
      const card1 = document.createElement("div");
      card1.className = "dragon";
      card1.innerHTML = `
        <img src="${d.img}">
        <p>${d.name}</p>
      `;
      card1.onclick = () => selectDragon(1, d.value, card1);

      // PLAYER 2 CARD
      const card2 = document.createElement("div");
      card2.className = "dragon";
      card2.innerHTML = `
        <img src="${d.img}">
        <p>${d.name}</p>
      `;
      card2.onclick = () => selectDragon(2, d.value, card2);

      p1List.appendChild(card1);
      p2List.appendChild(card2);
    });
}

// SELECT DRAGON
function selectDragon(player, value, element) {

  const parent = element.parentNode;
  parent.querySelectorAll(".dragon").forEach(el => el.classList.remove("selected"));
  element.classList.add("selected");

  if (player === 1) p1 = value;
  else p2 = value;
}

// TRADE CHECK
function checkTrade() {

  if (!p1 || !p2) {
    document.getElementById("result").innerText =
      "Pick dragons for both sides first!";
    return;
  }

  let diff = p1 - p2;
  let percent = diff / Math.max(p1, p2);

  let result = "";

  if (Math.abs(percent) < 0.1) {
    result = "FAIR TRADE";
  } 
  else if (percent > 0) {
    if (percent > 0.5) result = "HUGE WIN FOR YOU";
    else result = "WIN FOR YOU";
  } 
  else {
    if (percent < -0.5) result = "HUGE LOSS FOR YOU";
    else result = "LOSS FOR YOU";
  }

  document.getElementById("result").innerText =
    `You: ${p1} | Them: ${p2} → ${result}`;
}

// start page
renderDragons();
</script>

</body>
</html>
