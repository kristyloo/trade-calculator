<!DOCTYPE html>
<html>
<head>
  <title>Dragon Adventures Trade Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 120px;
      margin-top: 20px;
    }

    .trade-box {
      background: rgba(255,255,255,0.04);
      padding: 15px;
      border-radius: 15px;
      width: 340px;
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      gap: 10px;
      justify-content: center;
    }

    /* 🔥 FIXED SLOT BORDER (STRONGER + CLEAR) */
    .slot {
      width: 110px;
      height: 120px;
      background: #1e293b;
      border-radius: 12px;
      border: 2px solid #334155; /* stronger visible border */
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: 12px;
      padding: 5px;
    }

    .slot img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
    }

    .slot button {
      margin-top: 5px;
      cursor: pointer;
    }

    .add {
      background: #38bdf8;
      border: none;
      padding: 5px;
      border-radius: 5px;
    }

    .remove {
      background: #ef4444;
      border: none;
      color: white;
      padding: 3px;
      border-radius: 5px;
    }

    /* 🔥 POPUP SYSTEM (ADOPT ME STYLE) */
    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 15px;
      width: 420px;
      padding: 15px;
      z-index: 1000;
    }

    .popup input {
      width: 90%;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }

    .dragon-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-height: 300px;
      overflow-y: auto;
    }

    .dragon-card {
      background: #334155;
      padding: 10px;
      border-radius: 10px;
      width: 100px;
      cursor: pointer;
    }

    .dragon-card img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
    }

    .bar {
      width: 80%;
      height: 18px;
      background: #334155;
      margin: 20px auto;
      border-radius: 10px;
      overflow: hidden;
    }

    #wfl {
      height: 100%;
      width: 50%;
      background: #22c55e;
      transition: 0.3s;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 999;
    }
  </style>
</head>

<body>

<h1>Dragon Trade Calculator</h1>

<div class="container">

  <div class="trade-box">
    <h2>You</h2>
    <div id="youSlots" class="slots"></div>
  </div>

  <div class="trade-box">
    <h2>Them</h2>
    <div id="themSlots" class="slots"></div>
  </div>

</div>

<div class="bar">
  <div id="wfl"></div>
</div>

<div id="result"></div>

<!-- 🔥 POPUP -->
<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">

  <input id="searchBox" placeholder="Search dragons..." oninput="filterDragons()">

  <div id="dragonList" class="dragon-list"></div>

</div>

<script>

const dragons = [
  { name: "Veidreki", value: "35M", img: "https://static.wikia.nocookie.net/dragon-adventures/images/a/aa/Veidreki_Icon.png" },
  { name: "Alatura", value: "17M", img: "https://static.wikia.nocookie.net/dragon-adventures/images/d/d0/Alatura_Icon.png" },
  { name: "Moixura", value: "10M", img: "https://static.wikia.nocookie.net/dragon-adventures/images/2/27/Moixaura_Icon.png" },
  { name: "Venid", value: "2K", img: "https://static.wikia.nocookie.net/dragon-adventures/images/8/81/Venid_Icon.png" }
];

let you = [];
let them = [];
let activeSide = null;

const MAX = 9;

// VALUE PARSER
function parse(v) {
  v = v.toUpperCase();
  if (v.includes("M")) return parseFloat(v) * 1_000_000;
  if (v.includes("K")) return parseFloat(v) * 1_000;
  return parseFloat(v);
}

// RENDER SLOTS
function render() {
  draw("youSlots", you, 1);
  draw("themSlots", them, 2);
}

function draw(id, list, side) {

  const box = document.getElementById(id);
  box.innerHTML = "";

  for (let i = 0; i < MAX; i++) {

    const slot = document.createElement("div");
    slot.className = "slot";

    const item = list[i];

    if (item) {
      slot.innerHTML = `
        <img src="${item.img}">
        <small>${item.name}</small>
        <button class="remove" onclick="remove(${side}, ${i})">➖</button>
      `;
    } else {
      slot.innerHTML = `
        <button class="add" onclick="openPopup(${side})">➕</button>
      `;
    }

    box.appendChild(slot);
  }
}

// REMOVE
function remove(side, i) {
  if (side === 1) you.splice(i, 1);
  else them.splice(i, 1);
  update();
}

// POPUP OPEN
function openPopup(side) {
  activeSide = side;

  document.getElementById("popup").style.display = "block";
  document.getElementById("overlay").style.display = "block";

  renderDragonList(dragons);
}

// CLOSE POPUP
function closePopup() {
  document.getElementById("popup").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}

// DRAGON LIST
function renderDragonList(list) {

  const box = document.getElementById("dragonList");
  box.innerHTML = "";

  list.forEach(d => {

    const div = document.createElement("div");
    div.className = "dragon-card";

    div.innerHTML = `
      <img src="${d.img}">
      <div>${d.name}</div>
      <small>${d.value}</small>
    `;

    div.onclick = () => addDragon(d);

    box.appendChild(div);
  });
}

// SEARCH INSIDE POPUP
function filterDragons() {

  const val = document.getElementById("searchBox").value.toLowerCase();

  const filtered = dragons.filter(d =>
    d.name.toLowerCase().includes(val)
  );

  renderDragonList(filtered);
}

// ADD DRAGON
function addDragon(dragon) {

  if (activeSide === 1 && you.length < MAX) you.push(dragon);
  if (activeSide === 2 && them.length < MAX) them.push(dragon);

  closePopup();
  update();
}

// UPDATE TRADE
function update() {

  render();

  let youVal = you.reduce((a,b)=>a+parse(b.value),0);
  let themVal = them.reduce((a,b)=>a+parse(b.value),0);

  let diff = themVal - youVal;
  let percent = diff / Math.max(youVal, themVal || 1);

  let text = "";

  if (Math.abs(percent) < 0.1) text = "FAIR TRADE";
  else if (percent > 0) text = "WIN FOR YOU";
  else text = "LOSS FOR YOU";

  document.getElementById("result").innerText =
    `You: ${youVal.toLocaleString()} | Them: ${themVal.toLocaleString()} → ${text}`;

  let bar = document.getElementById("wfl");
  let width = 50 + percent * 50;
  width = Math.max(0, Math.min(100, width));

  bar.style.width = width + "%";
  bar.style.background = percent > 0 ? "#22c55e" : "#ef4444";
}

// START
render();
update();

</script>

</body>
</html>
