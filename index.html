<!DOCTYPE html>
<html>
<head>
  <title>Dragon Adventures Trade Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 60%;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
    }

    .trade-container {
      display: flex;
      justify-content: center;
      gap: 50px;
      margin-top: 20px;
    }

    .trade-box h2 {
      margin-bottom: 10px;
    }

    .slot-grid {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      gap: 10px;
    }

    .slot {
      width: 110px;
      height: 110px;
      background: #1e293b;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-direction: column;
      font-size: 14px;
    }

    .slot button {
      margin-top: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      padding: 3px 6px;
    }

    .add-btn {
      font-size: 20px;
      background: #38bdf8;
    }

    .remove-btn {
      background: #ef4444;
      color: white;
    }

    button.main {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      cursor: pointer;
      font-size: 16px;
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
    }

    .bar-container {
      width: 80%;
      height: 20px;
      background: #334155;
      margin: 20px auto;
      border-radius: 10px;
      overflow: hidden;
    }

    #wflBar {
      height: 100%;
      width: 50%;
      background: #22c55e;
      transition: 0.3s;
    }
  </style>
</head>

<body>

<h1>Dragon Adventures Trade Calculator</h1>

<input id="search" placeholder="Search dragons...">

<div class="trade-container">

  <div class="trade-box">
    <h2>You</h2>
    <div id="youSlots" class="slot-grid"></div>
  </div>

  <div class="trade-box">
    <h2>Them</h2>
    <div id="themSlots" class="slot-grid"></div>
  </div>

</div>

<button class="main" onclick="updateTrade()">Check Trade</button>

<div id="result"></div>

<div class="bar-container">
  <div id="wflBar"></div>
</div>

<script>

const dragons = [
  { name: "Veidreki", value: "35M" },
  { name: "Alatura", value: "17M" },
  { name: "Moixura", value: "10M" },
  { name: "Venid", value: "2K" }
];

let youItems = [];
let themItems = [];

const MAX = 9;

// VALUE PARSER
function parseValue(v) {
  if (!v) return 0;

  v = v.toString().toUpperCase().trim();

  if (v.endsWith("M")) return parseFloat(v) * 1_000_000;
  if (v.endsWith("K")) return parseFloat(v) * 1_000;

  return parseFloat(v) || 0;
}

// RENDER SLOTS
function renderSlots() {
  renderSide("youSlots", youItems, 1);
  renderSide("themSlots", themItems, 2);
}

function renderSide(id, list, player) {

  const box = document.getElementById(id);
  box.innerHTML = "";

  for (let i = 0; i < MAX; i++) {

    const slot = document.createElement("div");
    slot.className = "slot";

    const item = list[i];

    if (item) {
      slot.innerHTML = `
        <div>${item.name}</div>
        <button class="remove-btn" onclick="removeItem(${player}, ${i})">➖</button>
      `;
    } else {
      slot.innerHTML = `
        <button class="add-btn" onclick="addItem(${player})">➕</button>
      `;
    }

    box.appendChild(slot);
  }
}

// ADD ITEM
function addItem(player) {

  const dragon = dragons[Math.floor(Math.random() * dragons.length)];

  if (player === 1 && youItems.length < MAX) {
    youItems.push(dragon);
  }

  if (player === 2 && themItems.length < MAX) {
    themItems.push(dragon);
  }

  updateTrade();
}

// REMOVE ITEM
function removeItem(player, index) {

  if (player === 1) youItems.splice(index, 1);
  else themItems.splice(index, 1);

  updateTrade();
}

// UPDATE TRADE
function updateTrade() {

  renderSlots();

  let youTotal = youItems.reduce((a, b) => a + parseValue(b.value), 0);
  let themTotal = themItems.reduce((a, b) => a + parseValue(b.value), 0);

  let diff = themTotal - youTotal;
  let percent = diff / Math.max(youTotal, themTotal || 1);

  let text = "";

  if (Math.abs(percent) < 0.1) text = "FAIR TRADE";
  else if (percent > 0) text = percent > 0.5 ? "HUGE WIN FOR YOU" : "WIN FOR YOU";
  else text = percent < -0.5 ? "HUGE LOSS FOR YOU" : "LOSS FOR YOU";

  document.getElementById("result").innerText =
    `You: ${youTotal.toLocaleString()} | Them: ${themTotal.toLocaleString()} → ${text}`;

  updateBar(percent);
}

// WFL BAR
function updateBar(percent) {

  let bar = document.getElementById("wflBar");

  let width = 50 + percent * 50;
  width = Math.max(0, Math.min(100, width));

  bar.style.width = width + "%";

  if (percent > 0) {
    bar.style.background = "#22c55e"; // green
  } else {
    bar.style.background = "#ef4444"; // red
  }
}

// START
renderSlots();
updateTrade();

</script>

</body>
</html>
