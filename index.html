<!DOCTYPE html>
<html>
<head>
  <title>Dragon Adventures Value Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 60%;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
    }

    .section {
      margin: 20px 0;
    }

    .dragon-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .dragon {
      background: #1e293b;
      padding: 10px;
      border-radius: 12px;
      width: 120px;
      cursor: pointer;
      transition: 0.2s;
      border: 2px solid transparent;
    }

    .dragon:hover {
      transform: scale(1.05);
      border: 2px solid #38bdf8;
    }

    .dragon img {
      width: 80px;
      height: 80px;
      border-radius: 10px;
    }

    .selected {
      border: 2px solid #22c55e !important;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      cursor: pointer;
      font-size: 16px;
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
    }
  </style>
</head>

<body>

<h1>Dragon Adventures Value Calculator</h1>

<input id="search" placeholder="Search dragons...">

<div class="section">
  <h2>You</h2>
  <div id="youBox" class="dragon-grid"></div>
</div>

<div class="section">
  <h2>Them</h2>
  <div id="themBox" class="dragon-grid"></div>
</div>

<button onclick="checkTrade()">Check Trade</button>

<div id="result"></div>

<div style="width:80%; height:20px; background:#334155; margin:20px auto; border-radius:10px;">
  <div id="wflBar" style="height:100%; width:50%; background:#22c55e; border-radius:10px;"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const dragons = [
    { name: "Veidreki", value: "35M", img: "https://static.wikia.nocookie.net/dragon-adventures/images/a/aa/Veidreki_Icon.png" },
    { name: "Alatura", value: "17M", img: "https://static.wikia.nocookie.net/dragon-adventures/images/d/d0/Alatura_Icon.png" },
    { name: "Moixura", value: "10M", img: "https://static.wikia.nocookie.net/dragon-adventures/images/2/27/Moixaura_Icon.png" },
    { name: "Venid", value: "2K", img: "https://static.wikia.nocookie.net/dragon-adventures/images/8/81/Venid_Icon.png" }
  ];

  // 9-slot trade system
  let p1 = [];
  let p2 = [];

  const MAX_SLOTS = 9;

  function parseValue(input) {
    if (!input) return 0;
    input = input.toString().toUpperCase().trim();

    if (input.endsWith("M")) return parseFloat(input) * 1_000_000;
    if (input.endsWith("K")) return parseFloat(input) * 1_000;

    return parseFloat(input) || 0;
  }

  function renderDragons() {
    const search = document.getElementById("search").value.toLowerCase();

    const youBox = document.getElementById("youBox");
    const themBox = document.getElementById("themBox");

    youBox.innerHTML = "";
    themBox.innerHTML = "";

    dragons
      .filter(d => d.name.toLowerCase().includes(search))
      .forEach(d => {

        // YOU SIDE
        const card1 = document.createElement("div");
        card1.className = "dragon";
        card1.innerHTML = `
          <img src="${d.img}">
          <p>${d.name}</p>
          <button>➕</button>
        `;
        card1.querySelector("button").onclick = () => addDragon(1, d);

        // THEM SIDE
        const card2 = document.createElement("div");
        card2.className = "dragon";
        card2.innerHTML = `
          <img src="${d.img}">
          <p>${d.name}</p>
          <button>➕</button>
        `;
        card2.querySelector("button").onclick = () => addDragon(2, d);

        youBox.appendChild(card1);
        themBox.appendChild(card2);
      });
  }

  function addDragon(player, dragon) {

    let list = player === 1 ? p1 : p2;

    if (list.length >= MAX_SLOTS) {
      alert("Max 9 slots reached!");
      return;
    }

    list.push(dragon.value);

    if (player === 1) p1 = list;
    else p2 = list;

    updateTradeUI();
  }

  function removeDragon(player, index) {

    let list = player === 1 ? p1 : p2;

    list.splice(index, 1);

    if (player === 1) p1 = list;
    else p2 = list;

    updateTradeUI();
  }

  function updateTradeUI() {
    renderSlots();
    checkTrade();
  }

  function renderSlots() {

    const youBox = document.getElementById("youBox");
    const themBox = document.getElementById("themBox");

    youBox.innerHTML = "";
    themBox.innerHTML = "";

    renderSide(p1, 1, youBox);
    renderSide(p2, 2, themBox);
  }

  function renderSide(list, player, container) {

    list.forEach((val, i) => {

      const div = document.createElement("div");
      div.className = "dragon selected";
      div.innerHTML = `
        <p>${val}</p>
        <button>➖</button>
      `;

      div.querySelector("button").onclick = () => removeDragon(player, i);

      container.appendChild(div);
    });
  }

  function checkTrade() {

    let p1Total = p1.reduce((sum, v) => sum + parseValue(v), 0);
    let p2Total = p2.reduce((sum, v) => sum + parseValue(v), 0);

    let diff = p2Total - p1Total;
    let percent = diff / Math.max(p1Total, p2Total);

    let text = "";

    if (Math.abs(percent) < 0.1) text = "FAIR TRADE";
    else if (percent > 0) text = percent > 0.5 ? "HUGE WIN FOR YOU" : "WIN FOR YOU";
    else text = percent < -0.5 ? "HUGE LOSS FOR YOU" : "LOSS FOR YOU";

    document.getElementById("result").innerText =
      `You: ${p1Total.toLocaleString()} | Them: ${p2Total.toLocaleString()} → ${text}`;

    updateBar(p1Total, p2Total);
  }

  // WFL BAR
  function updateBar(p1Total, p2Total) {

    let bar = document.getElementById("wflBar");

    let total = p1Total + p2Total;
    let percent = total === 0 ? 50 : (p2Total / total) * 100;

    bar.style.width = percent + "%";
  }

  document.getElementById("search").addEventListener("input", renderDragons);

  window.checkTrade = checkTrade;

  renderDragons();
});
</script>
