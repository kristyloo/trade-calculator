<!DOCTYPE html>
<html>
<head>
  <title>Dragon Adventures Trade Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 120px;
      margin-top: 20px;
    }

    .trade-box {
      background: rgba(255,255,255,0.04);
      padding: 15px;
      border-radius: 15px;
      width: 340px;
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      gap: 10px;
      justify-content: center;
    }

    .slot {
      width: 110px;
      height: 145px;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-size: 12px;
      padding: 6px;
      overflow: hidden;
    }

    .slot img {
      width: 72px;
      height: 72px;
      border-radius: 8px;
      object-fit: contain;
    }

/* potion / legendary icons */
    .icon-row {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-top: 5px;
    }


    .icon-row img {
      width: 26px;  
      height: 26px;
      object-fit: contain;
    }

    .add {
      background: #38bdf8;
      border: none;
      padding: 5px;
      border-radius: 5px;
      cursor: pointer;
    }

    .remove {
      background: #ef4444;
      border: none;
      color: white;
      padding: 3px;
      border-radius: 5px;
      cursor: pointer;
    }

    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 15px;
      width: 420px;
      padding: 18px;
      z-index: 1000;
      text-align: left;
    }

    .overlay {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 999;
    }

    .dragon-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-height: 300px;
      overflow-y: auto;
    }

    .dragon-card {
      background: #334155;
      padding: 10px;
      border-radius: 10px;
      width: 100px;
      cursor: pointer;
      text-align: center;
    }

    .dragon-card img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
    }

    .bar {
      width: 80%;
      height: 18px;
      background: #334155;
      margin: 20px auto;
      border-radius: 10px;
      overflow: hidden;
    }

    #wfl {
      height: 100%;
      width: 50%;
      background: #22c55e;
      transition: 0.3s;
    }

    #wflText {
      margin-top: 10px;
      font-weight: bold;
    }

    input {
      width: 95%;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }

    .popup label {
      display: block;
      margin: 8px 0;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>Dragon Adventures Trade Calculator</h1>

<div class="container">

  <div class="trade-box">
    <h2>You</h2>
    <div id="youSlots" class="slots"></div>
  </div>

  <div class="trade-box">
    <h2>Them</h2>
    <div id="themSlots" class="slots"></div>
  </div>

</div>

<div class="bar">
  <div id="wfl"></div>
</div>

<div id="wflText"></div>
<div id="result"></div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <input id="searchBox" placeholder="Search dragons..." oninput="filterDragons()">
  <div id="dragonList" class="dragon-list"></div>
</div>

<!-- OPTIONS POPUP -->
<div class="popup" id="optionsPopup">

  <h3>Dragon Options</h3>

  <label><input type="checkbox" id="mut"> Mutation</label>
  <label><input type="checkbox" id="legC"> Legendary Color</label>
  <label><input type="checkbox" id="legE"> Legendary Eye</label>

  <br><br>

  <button style="
    background:#38bdf8;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
  " onclick="confirmAdd()">
    Add Dragon
  </button>

</div>

<script>

const dragons = [
  { name:"Veidreki", value:"35M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/a/aa/Veidreki_Icon.png" },
  { name:"Alatura", value:"17M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/d/d0/Alatura_Icon.png" },
  { name:"Moixura", value:"10M", type:"guild", img:"https://static.wikia.nocookie.net/dragon-adventures/images/2/27/Moixaura_Icon.png" },
  { name:"Venid", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/8/81/Venid_Icon.png" },
  { name:"Voltstorm", value:"3M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/7/76/Voltstorm_Icon.png" },
  { name:"Vulpiruth", value:"50K", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/b/b1/Vulpiruth_Icon.png" },
  { name:"Djaevelhest", value:"150K", type:"event", img:"https://static.wikia.nocookie.net/dragon-adventures/images/b/b0/Djaevelhest_Icon.png" },
  { name:"Impiavolo", value:"800K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/3/39/Impiavolo_Icon.png" }
];

/* ✅ FIXED: now includes EVENT type */
const bonuses = {
  mutation: {
    world: 250000,
    season: 500000,
    guild: 500000,
    event: 250000
  },
  legColor: {
    world: 500000,
    season: 1000000,
    guild: 500000,
    event: 500000
  },
  legEye: {
    world: 500000,
    season: 1000000,
    guild: 1000000,
    event: 1000000
  }
};

let you=[], them=[], activeSide=null, pendingDragon=null;
const MAX=9;

function parse(v){
  v=v.toUpperCase();
  if(v.includes("M")) return parseFloat(v)*1e6;
  if(v.includes("K")) return parseFloat(v)*1e3;
  return parseFloat(v);
}

function getFinalValue(item){
  let base=parse(item.base.value), extra=0;

  if(item.mutation) extra+=bonuses.mutation[item.base.type]||0;
  if(item.legColor) extra+=bonuses.legColor[item.base.type]||0;
  if(item.legEye) extra+=bonuses.legEye[item.base.type]||0;

  return base+extra;
}

function render(){
  draw("youSlots",you,1);
  draw("themSlots",them,2);
}

function draw(id,list,side){
  let box=document.getElementById(id);
  box.innerHTML="";

  for(let i=0;i<MAX;i++){
    let slot=document.createElement("div");
    slot.className="slot";

    let item=list[i];

    if(item){
      slot.innerHTML=`
        <img src="${item.base.img}">
        <small>${item.base.name}</small>

        <div class="icon-row">
          ${item.mutation ? '<img src="https://static.wikia.nocookie.net/dragon-adventures/images/e/ec/Mutation_Potion.png">' : ""}
          ${item.legColor ? '<img src="https://static.wikia.nocookie.net/dragon-adventures/images/4/4f/Legendary_Color_Potion.png">' : ""}
          ${item.legEye ? '<img src="https://static.wikia.nocookie.net/dragon-adventures/images/f/f9/Legendary_Pupil_Potion.png">' : ""}
        </div>

        <button class="remove" onclick="remove(${side},${i})">➖</button>
      `;
    } else {
      slot.innerHTML=`<button class="add" onclick="openPopup(${side})">➕</button>`;
    }

    box.appendChild(slot);
  }
}

function openPopup(side){
  activeSide=side;
  popup.style.display="block";
  overlay.style.display="block";
  renderDragonList(dragons);
}

function closePopup(){
  popup.style.display="none";
  overlay.style.display="none";
  optionsPopup.style.display="none";
}

function renderDragonList(list){
  let box=document.getElementById("dragonList");
  box.innerHTML="";

  list.forEach(d=>{
    let div=document.createElement("div");
    div.className="dragon-card";
    div.innerHTML=`<img src="${d.img}"><div>${d.name}</div>`;
    div.onclick=()=>addDragon(d);
    box.appendChild(div);
  });
}

function filterDragons(){
  let val=searchBox.value.toLowerCase();
  renderDragonList(dragons.filter(d=>d.name.toLowerCase().includes(val)));
}

function addDragon(d){
  pendingDragon=d;
  optionsPopup.style.display="block";
}

function confirmAdd(){
  let item={
    base:pendingDragon,
    mutation:mut.checked,
    legColor:legC.checked,
    legEye:legE.checked
  };

  if(activeSide===1 && you.length<MAX) you.push(item);
  if(activeSide===2 && them.length<MAX) them.push(item);

  closePopup();
  update();
}

function remove(side,i){
  side===1?you.splice(i,1):them.splice(i,1);
  update();
}

function update(){
  render();

  let y=you.reduce((s,i)=>s+getFinalValue(i),0);
  let t=them.reduce((s,i)=>s+getFinalValue(i),0);

  let diff=t-y;
  let p=diff/Math.max(y,t||1);

  let bar=wfl;
  let width=50+p*50;
  width=Math.max(0,Math.min(100,width));

  bar.style.width=width+"%";
  bar.style.background=p>0.1?"#22c55e":p<-0.1?"#ef4444":"#facc15";

  let a=Math.abs(p);
  let label=a<0.1?"FAIR TRADE":
            p>0.3?"BIG WIN":
            p>0.1?"SMALL WIN":
            p<-0.3?"BIG LOSS":"SMALL LOSS";

  wflText.innerText=label;

  result.innerText=`You: ${y.toLocaleString()} | Them: ${t.toLocaleString()}`;
}

render();
update();

</script>

</body>
</html>
