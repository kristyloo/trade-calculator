<!DOCTYPE html>
<html>
<head>
  <title>Dragon Adventures Trade Calculator</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 60%;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 120px; 
      margin-top: 20px;
    }
    
    .trade-box {
      background: rgba(255,255,255,0.04);
      padding: 15px;
      border-radius: 15px;
      min-height: 420px;
    }

    .trade-box {
      width: 320px;
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      gap: 10px;
    }

    .slot {
      width: 110px;
      height: 120px;
      background: #1e293b;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: 12px;
      padding: 5px;
    }

    .slot img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
    }

    .slot button {
      margin-top: 5px;
      font-size: 12px;
      cursor: pointer;
    }

    .add {
      background: #38bdf8;
      border: none;
      padding: 5px;
      border-radius: 5px;
    }

    .remove {
      background: #ef4444;
      border: none;
      color: white;
      padding: 3px;
      border-radius: 5px;
    }

    .catalog {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .dragon {
      background: #334155;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      width: 110px;
    }

    .dragon img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
    }

    .bar {
      width: 80%;
      height: 18px;
      background: #334155;
      margin: 20px auto;
      border-radius: 10px;
      overflow: hidden;
    }
    
    #wfl {
      height: 100%;
      width: 50%;
      background: #22c55e;
      transition: 0.3s;
    }
  </style>
</head>

<body>

<h1>Dragon Adventures Trade Calculator</h1>

<input id="search" placeholder="Search dragons...">

<div class="container">

  <div class="trade-box">
    <h2>You</h2>
    <div id="youSlots" class="slots"></div>
  </div>

  <div class="trade-box">
    <h2>Them</h2>
    <div id="themSlots" class="slots"></div>
  </div>

</div>

<h3>Select Dragon</h3>
<div id="catalog" class="catalog"></div>

<div class="bar">
  <div id="wfl"></div>
</div>

<div id="result"></div>

<script>

const dragons = [
  { name: "Veidreki", value: "35M", img: "https://static.wikia.nocookie.net/dragon-adventures/images/a/aa/Veidreki_Icon.png" },
  { name: "Alatura", value: "17M", img: "https://static.wikia.nocookie.net/dragon-adventures/images/d/d0/Alatura_Icon.png" },
  { name: "Moixura", value: "10M", img: "https://static.wikia.nocookie.net/dragon-adventures/images/2/27/Moixaura_Icon.png" },
  { name: "Venid", value: "2K", img: "https://static.wikia.nocookie.net/dragon-adventures/images/8/81/Venid_Icon.png" }
];

let you = [];
let them = [];

let selectedDragon = null;

const MAX = 9;

// VALUE PARSER
function parse(v) {
  v = v.toUpperCase();
  if (v.includes("M")) return parseFloat(v) * 1_000_000;
  if (v.includes("K")) return parseFloat(v) * 1_000;
  return parseFloat(v);
}

// BUILD CATALOG
function buildCatalog() {
  const box = document.getElementById("catalog");

  dragons.forEach(d => {
    const div = document.createElement("div");
    div.className = "dragon";

    div.innerHTML = `
      <img src="${d.img}">
      <div>${d.name}</div>
      <small>${d.value}</small>
    `;

    div.onclick = () => selectedDragon = d;

    box.appendChild(div);
  });
}

// RENDER SLOTS
function render() {
  draw("youSlots", you, 1);
  draw("themSlots", them, 2);
}

function draw(id, list, side) {

  const box = document.getElementById(id);
  box.innerHTML = "";

  for (let i = 0; i < MAX; i++) {

    const slot = document.createElement("div");
    slot.className = "slot";

    const item = list[i];

    if (item) {
      slot.innerHTML = `
        <img src="${item.img}">
        <small>${item.name}</small>
        <button class="remove" onclick="remove(${side}, ${i})">➖</button>
      `;
    } else {
      slot.innerHTML = `
        <button class="add" onclick="add(${side})">➕</button>
      `;
    }

    box.appendChild(slot);
  }
}

// ADD ITEM
function add(side) {

  if (!selectedDragon) {
    alert("Select a dragon first!");
    return;
  }

  if (side === 1 && you.length < MAX) you.push(selectedDragon);
  if (side === 2 && them.length < MAX) them.push(selectedDragon);

  update();
}

// REMOVE ITEM
function remove(side, i) {
  if (side === 1) you.splice(i, 1);
  else them.splice(i, 1);

  update();
}

// UPDATE EVERYTHING
function update() {

  render();

  let youVal = you.reduce((a,b)=>a+parse(b.value),0);
  let themVal = them.reduce((a,b)=>a+parse(b.value),0);

  let diff = themVal - youVal;
  let percent = diff / Math.max(youVal, themVal || 1);

  let text = "";

  if (Math.abs(percent) < 0.1) text = "FAIR TRADE";
  else if (percent > 0) text = "WIN FOR YOU";
  else text = "LOSS FOR YOU";

  document.getElementById("result").innerText =
    `You: ${youVal.toLocaleString()} | Them: ${themVal.toLocaleString()} → ${text}`;

  let bar = document.getElementById("wfl");
  let width = 50 + percent * 50;
  width = Math.max(0, Math.min(100, width));

  bar.style.width = width + "%";
  bar.style.background = percent > 0 ? "#22c55e" : "#ef4444";
}

// SEARCH (optional simple filter)
document.getElementById("search").addEventListener("input", function () {
  const val = this.value.toLowerCase();
  const boxes = document.querySelectorAll(".dragon");

  boxes.forEach(b => {
    b.style.display = b.innerText.toLowerCase().includes(val) ? "block" : "none";
  });
});

// START
buildCatalog();
render();
update();

</script>

</body>
</html>
