<!DOCTYPE html>
<html>
<head>
<title>Dragon Trade Calculator</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  justify-content: center;
  gap: 120px;
}

.trade-box {
  background: rgba(255,255,255,0.04);
  padding: 15px;
  border-radius: 15px;
  width: 340px;
}

.slots {
  display: grid;
  grid-template-columns: repeat(3, 110px);
  gap: 10px;
}

.slot {
  width: 110px;
  height: 120px;
  background: #1e293b;
  border: 2px solid #334155;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.slot img {
  width: 60px;
}

.add { background:#38bdf8; border:none; }
.remove { background:#ef4444; border:none; color:white; }

.popup {
  display:none;
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#0f172a;
  padding:15px;
  border-radius:12px;
}

.overlay {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<h1>Dragon Trade Calculator</h1>

<div class="container">

<div class="trade-box">
<h2>You</h2>
<div id="youSlots" class="slots"></div>
</div>

<div class="trade-box">
<h2>Them</h2>
<div id="themSlots" class="slots"></div>
</div>

</div>

<div id="result"></div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">
<input id="searchBox" placeholder="Search..." oninput="filterDragons()">
<div id="dragonList"></div>
</div>

<!-- OPTIONS POPUP -->
<div class="popup" id="optionsPopup">
<h3>Options</h3>
<label><input type="checkbox" id="mut"> Mutation</label><br>
<label><input type="checkbox" id="legC"> Leg Color</label><br>
<label><input type="checkbox" id="legE"> Leg Eye</label><br>
<button onclick="confirmAdd()">Add</button>
</div>

<script>

const dragons = [
{ name:"Veidreki", value:"35M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/a/aa/Veidreki_Icon.png"},
{ name:"Moixura", value:"10M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/2/27/Moixaura_Icon.png"},
{ name:"Venid", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/8/81/Venid_Icon.png"}
];

const bonuses = {
mutation:{ world:250000, season:500000, event:300000, guild:500000 },
legColor:{ world:500000, season:1000000, event:500000, guild:500000 },
legEye:{ world:500000, season:1000000, event:500000, guild:1000000 }
};

let you = [];
let them = [];
let activeSide = null;
let pendingDragon = null;

const MAX = 9;

function parse(v){
if(v.includes("M")) return parseFloat(v)*1000000;
if(v.includes("K")) return parseFloat(v)*1000;
return parseFloat(v);
}

function getFinalValue(item){
let base = parse(item.base.value);
let extra = 0;

if(item.mutation) extra += bonuses.mutation[item.base.type] || 0;
if(item.legColor) extra += bonuses.legColor[item.base.type] || 0;
if(item.legEye) extra += bonuses.legEye[item.base.type] || 0;

return base + extra;
}

function render(){
draw("youSlots", you,1);
draw("themSlots", them,2);
}

function draw(id,list,side){
let box=document.getElementById(id);
box.innerHTML="";

for(let i=0;i<MAX;i++){
let slot=document.createElement("div");
slot.className="slot";

let item=list[i];

if(item){
slot.innerHTML=`
<img src="${item.base.img}">
${item.base.name}

<div>
${item.mutation ? '<img src="https://static.wikia.nocookie.net/dragon-adventures/images/e/ec/Mutation_Potion.png" width="14">' : ""}
${item.legColor ? '<img src="https://static.wikia.nocookie.net/dragon-adventures/images/4/4f/Legendary_Color_Potion.png" width="14">' : ""}
${item.legEye ? '<img src="https://static.wikia.nocookie.net/dragon-adventures/images/f/f9/Legendary_Pupil_Potion.png" width="14">' : ""}
</div>

<button class="remove" onclick="remove(${side},${i})">➖</button>
`;
}else{
slot.innerHTML=`<button class="add" onclick="openPopup(${side})">➕</button>`;
}

box.appendChild(slot);
}
}

function openPopup(side){
activeSide=side;
document.getElementById("popup").style.display="block";
document.getElementById("overlay").style.display="block";
renderDragonList(dragons);
}

function closePopup(){
document.getElementById("popup").style.display="none";
document.getElementById("overlay").style.display="none";
document.getElementById("optionsPopup").style.display="none";
}

function renderDragonList(list){
let box=document.getElementById("dragonList");
box.innerHTML="";

list.forEach(d=>{
let div=document.createElement("div");
div.innerHTML=`${d.name} (${d.value})`;
div.onclick=()=>addDragon(d);
box.appendChild(div);
});
}

function filterDragons(){
let val=document.getElementById("searchBox").value.toLowerCase();
renderDragonList(dragons.filter(d=>d.name.toLowerCase().includes(val)));
}

function addDragon(d){
pendingDragon=d;
document.getElementById("optionsPopup").style.display="block";
}

function confirmAdd(){
let item={
base:pendingDragon,
mutation:document.getElementById("mut").checked,
legColor:document.getElementById("legC").checked,
legEye:document.getElementById("legE").checked
};

if(activeSide===1 && you.length<MAX) you.push(item);
if(activeSide===2 && them.length<MAX) them.push(item);

closePopup();
update();
}

function remove(side,i){
if(side===1) you.splice(i,1);
else them.splice(i,1);
update();
}

function update(){

render();

let youVal=you.reduce((s,i)=>s+getFinalValue(i),0);
let themVal=them.reduce((s,i)=>s+getFinalValue(i),0);

document.getElementById("result").innerText =
`You: ${youVal.toLocaleString()} | Them: ${themVal.toLocaleString()}`;
}

render();

</script>

</body>
</html>
